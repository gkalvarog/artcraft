# Configuration for the agent_notify_server.
#
# Each *_sound key may point to a .wav or .mp3 file. If a key is omitted (or
# the file is missing) the corresponding endpoint becomes a no-op.
#
# `loop_alert_timeout_millis` is the gap *between* consecutive plays of a
# single voice (after one play finishes, before the next begins). If
# omitted, looping sounds replay back-to-back.
#
# Escalation: after a /loop_* endpoint starts a loop, additional concurrent
# voices join the mix at the configured wait times. Each new voice is
# picked from `extra_alert_<state>_sounds` in order; if the pool is
# exhausted the supervisor cycles back through it, so existing voices
# double up. Voices are independent threads and drift naturally relative
# to each other.

# Paths can be absolute, or relative to this YAML file's directory.
alert_beep_sound: test_beep.wav
alert_done_sound: /Users/bt/dev/storyteller/artcraft/frontend/apps/artcraft/app/public/resources/sound/smrpg_flower.wav
alert_await_user_input_sound: /Users/bt/dev/storyteller/artcraft/frontend/apps/artcraft/app/public/resources/sound/smrpg_ghost.wav

extra_alert_beep_sounds: []

extra_alert_done_sounds:
  - /Users/bt/dev/storyteller/artcraft/frontend/apps/artcraft/app/public/resources/sound/smrpg_specialflower.wav
  - /Users/bt/dev/storyteller/artcraft/frontend/apps/artcraft/app/public/resources/sound/smrpg_correct.wav
  - /Users/bt/dev/storyteller/artcraft/frontend/apps/artcraft/app/public/resources/sound/smrpg_character_extrapower.wav

extra_alert_await_sounds:
  - /Users/bt/dev/storyteller/artcraft/frontend/apps/artcraft/app/public/resources/sound/smrpg_wrong.wav
  - /Users/bt/dev/storyteller/artcraft/frontend/apps/artcraft/app/public/resources/sound/smrpg_drybones_crumble.wav
  - /Users/bt/dev/storyteller/artcraft/frontend/apps/artcraft/app/public/resources/sound/smrpg_enemy_spikethrow.wav

loop_alert_timeout_millis: 2000

# Optional per-stage gaps. Each falls back to the previous stage when unset,
# so leaving them out keeps the loop at `loop_alert_timeout_millis` the whole
# time; specifying them lets the loop accelerate as it escalates.
loop_alert_timeout_millis_1: 1000
loop_alert_timeout_millis_2: 500
loop_alert_timeout_millis_3: 200

# Random +/- jitter applied to each sleep. Same fallback rules as the timeout
# schedule above. A fresh random offset is drawn on every iteration of every
# voice, so voices never re-align. Set values close to the gap for chaos;
# set to 0 to disable jitter at that stage.
loop_alert_jitter_millis: 1500
loop_alert_jitter_millis_1: 750
loop_alert_jitter_millis_2: 400
loop_alert_jitter_millis_3: 180

# Seconds-from-loop-start at which voices 2, 3, and 4 join the mix.
escalate_wait_1: 10
escalate_wait_2: 20
escalate_wait_3: 30

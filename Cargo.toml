walkdir = "2.4.0"

# NB: wreq gets past fingerprinting, but we have to deal with platform-specific build issues.
#
# Mac:
#   brew install --formula cmake pkg-config llvm
# Windows:
#   choco install cmake -y
#   choco install strawberryperl -y
#   choco install pkgconfiglite -y
#   choco install llvm -y
#   choco install nasm -y
wreq-util = "3.0.0-rc.10"
wreq = { version = "6.0.0-rc.28", features = ["json", "query", "form", "multipart", "cookies", "ws", "stream", "gzip", "brotli", "zstd", "deflate"] }

